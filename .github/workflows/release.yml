name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Jellyfin Server (for DLLs)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gnupg curl
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.jellyfin.org/jellyfin_team.gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/jellyfin.gpg
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/jellyfin.gpg] \
            https://repo.jellyfin.org/ubuntu $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/jellyfin.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends jellyfin-server

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.Audible/Jellyfin.Plugin.Audible.csproj \
            -c Release \
            -p:JellyfinDir=/usr/lib/jellyfin/bin

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package
        id: package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          ZIP="jellyfin-plugin-audible_${VERSION}.0.zip"
          zip -j "$ZIP" Jellyfin.Plugin.Audible/bin/Release/net9.0/Jellyfin.Plugin.Audible.dll
          MD5=$(md5sum "$ZIP" | awk '{print $1}')
          echo "ZIP=$ZIP" >> $GITHUB_OUTPUT
          echo "MD5=$MD5" >> $GITHUB_OUTPUT
          echo "FULL_VERSION=${VERSION}.0" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone

          version   = os.environ["FULL_VERSION"]
          md5       = os.environ["MD5"]
          zip_name  = os.environ["ZIP"]
          repo      = "HellTruckerfr/jellyfin-plugin-audible"
          tag       = "v" + version.rsplit(".", 1)[0]   # v1.0.0 from 1.0.0.0
          url       = f"https://github.com/{repo}/releases/download/{tag}/{zip_name}"
          timestamp = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          with open("manifest.json") as f:
              m = json.load(f)

          new_entry = {
              "version":   version,
              "changelog": "See release notes",
              "targetAbi": "10.11.0.0",
              "sourceUrl": url,
              "checksum":  md5,
              "timestamp": timestamp,
          }
          # Replace or prepend
          m[0]["versions"] = [new_entry] + [
              v for v in m[0]["versions"] if v["version"] != version
          ]
          with open("manifest.json", "w") as f:
              json.dump(m, f, indent=2)
          print("manifest.json updated:", new_entry)
          PYEOF
        env:
          FULL_VERSION: ${{ steps.package.outputs.FULL_VERSION }}
          MD5: ${{ steps.package.outputs.MD5 }}
          ZIP: ${{ steps.package.outputs.ZIP }}

      - name: Commit manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "chore: update manifest for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.ZIP }}
          generate_release_notes: true
